<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🦌了吗</title>

    <script src="./🦌了吗_files/saved_resource"></script>

    <style>
        :root { --主色: #6750A4; --背景: #F7F2FA; --卡片: #E7E0EC; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { height: 100%; margin: 0; font-family: sans-serif; background: var(--背景); overflow: hidden; }

        header { height: 60px; display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: bold; color: var(--主色); border-bottom: 1px solid #ddd; }

        #content { height: calc(100% - 140px); overflow-y: auto; padding: 15px; position: relative; }
        .view { display: none; }
        .active { display: block !important; }

        .card { background: var(--卡片); border-radius: 28px; padding: 25px; margin-bottom: 15px; }
        .num { font-size: 45px; font-weight: 900; color: var(--主色); text-align: center; display: block; }
        .label { font-size: 13px; color: #79747E; text-align: center; }

        .btn-deer { background: var(--主色); color: white; border: none; width: 100%; padding: 20px; border-radius: 30px; font-size: 20px; font-weight: bold; margin-top: 15px; cursor: pointer; }
        .btn-deer:active { opacity: 0.8; transform: scale(0.96); }

        #jm-box { background: #F3EDF7; border: 2px dashed var(--主色); border-radius: 20px; padding: 15px; margin-top: 15px; text-align: center; display: none; }
        .code { font-size: 32px; font-weight: 900; color: #B3261E; letter-spacing: 4px; }

        .link-btn { display: block; background: white; padding: 20px; border-radius: 20px; margin-bottom: 12px; text-align: center; text-decoration: none; color: #000; font-weight: bold; border: 1px solid #eee; }

        nav { position: fixed; bottom: 0; width: 100%; height: 80px; background: #F3EDF7; display: flex; align-items: center; border-top: 1px solid #ddd; z-index: 100; }
        .tab { flex: 1; text-align: center; font-size: 14px; color: #79747E; cursor: pointer; font-weight: bold; }
        .tab-active { color: var(--主色); }
        .pill { width: 60px; height: 32px; border-radius: 16px; margin: 0 auto 4px; display: flex; align-items: center; justify-content: center; transition: 0.3s; }
        .tab-active .pill { background: #E8DEF8; }

        .mask { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .dialog { background: white; padding: 30px; border-radius: 28px; width: 85%; }
        input { width: 100%; padding: 15px; border: 2px solid var(--主色); border-radius: 15px; font-size: 18px; margin: 20px 0; outline: none; }

        #img-preview { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 10000; }
        #img-preview img { max-width: 90%; border-radius: 15px; border: 2px solid white; }
    </style>
</head>
<body>

    <div id="mask" class="mask">
        <div class="dialog">
            <h2 style="margin:0">代号设置</h2>
            <input type="text" id="name-in" placeholder="输入代号">
            <button onclick="saveName()" class="btn-deer" style="margin-top:0">开始🦌管</button>
        </div>
    </div>

    <div id="img-preview" onclick="this.style.display='none'">
        <p style="color:white;">长按下方图片保存战绩</p>
        <div id="img-box"></div>
        <p style="color:white; font-size:12px;">点击任意位置关闭</p>
    </div>

    <header>🦌了吗</header>

    <div id="content">
        <div id="v0" class="view active">
            <div id="shot-area" style="background: var(--背景); padding: 10px; border-radius: 20px;">
                <div id="name-out" style="text-align:center; font-weight:bold; color:var(--主色); padding:10px;">代号：...</div>
                <div class="card">
                    <div style="display:flex; justify-content:space-around;">
                        <div><span class="num" id="j-val">0</span><span class="label">今日🦌管</span></div>
                        <div><span class="num" id="z-val">0</span><span class="label">累计总数</span></div>
                    </div>
                    <button class="btn-deer" onclick="doDeer()">立即🦌管</button>
                    <div id="jm-box">
                        <div class="label" style="font-weight:bold;">✨ JM助🦌代码 ✨</div>
                        <div class="code" id="code-val">000000</div>
                    </div>
                </div>
            </div>
            <button onclick="makeShot()" style="width:100%; border:1px solid #79747E; background:none; color:var(--主色); padding:12px; border-radius:50px; font-weight:bold; cursor:pointer;">生成战绩海报</button>
        </div>

        <div id="v1" class="view">
            <div class="card" style="background:white; border:1px solid #eee;">
                <div style="text-align:center; font-weight:bold; margin-bottom:20px;">地区活跃排行</div>
                <div id="rank-list"></div>
            </div>
        </div>

        <div id="v2" class="view">
            <div class="card" style="text-align:center;">
                <div class="label">开发团队</div>
                <div style="font-size:26px; font-weight:bold; color:var(--主色); margin:10px 0;">Yresr & MZTN</div>
                <div style="height:1px; background:rgba(0,0,0,0.1); margin:20px 0;"></div>
                
                <a href="https://pub-98e77454d5fc46438fe6f46cf574e4e5.r2.dev/qr%20by%20qq.html" class="link-btn" target="_blank"> QQ社区</a>
                <a href="https://view.kuafuai.net/1159237/" class="link-btn" target="_blank"> 在线社区</a>
                
                <p class="label" style="margin-top:20px;">版本: 1.0.091</p>
            </div>
        </div>
    </div>

    <nav>
        <div class="tab tab-active" onclick="go(0)"><div class="pill">首</div>首页</div>
        <div class="tab" onclick="go(1)"><div class="pill">排</div>排行</div>
        <div class="tab" onclick="jumpMap()"><div class="pill">地</div>地图</div>
        <div class="tab" onclick="go(2)"><div class="pill">我</div>我的</div>
    </nav>

    <script>
        var data = JSON.parse(localStorage.getItem('DEER_LAST_DATA')) || { j:0, z:0, n:"", t:"" };
        var today = new Date().toDateString();
        if(data.t !== today) { data.j = 0; data.t = today; }

        if(data.n) {
            document.getElementById('mask').style.display = 'none';
            render();
        }

        function saveName() {
            var n = document.getElementById('name-in').value.trim();
            if(!n) { alert('请输入代号'); return; }
            data.n = n;
            document.getElementById('mask').style.display = 'none';
            render();
        }

        function go(n) {
            var views = document.getElementsByClassName('view');
            var tabs = document.getElementsByClassName('tab');
            for(var i=0; i<views.length; i++) {
                views[i].className = 'view';
                tabs[i === 2 ? 3 : i].className = 'tab';
            }
            document.getElementById('v' + n).className = 'view active';
            document.querySelectorAll('.tab')[n === 2 ? 3 : n].className = 'tab tab-active';
        }

        function jumpMap() {
            window.location.href = "https://preview.kuafuai.net/?shard_param=bXVqK0F2dFQxa0Z0bkhGcGxqY2k2UTVBQzRzSGxjczVQV2JUVVRTeUdlVlQzQXJzNVRtRmpLZmRNOW5vSENpTGszMU9mT1pacy9nTUozMUErSWIrTWc9PQ==&app_id=172980&app_invite_code=HRPEC9TM&user=MZTNHZK&lang=zh-CN"
        }

        /* ---------------------------
           固定 JM 代码（随机抽取）
        ---------------------------- */
        var jmList = [
            637857,350234,136494,405848,481481,568070,628539,627898,628555,627899,
            611650,323666,363848,454278,559716,629252,626487,400002,208092,253199,
            382596,418600,565616,222458,611674,636531,553350,1087303,392645,433651,
            642039,1193291
        ];

        function doDeer() {
            data.j++; 
            data.z++;

            var code = jmList[Math.floor(Math.random() * jmList.length)];

            document.getElementById('jm-box').style.display = 'block';
            document.getElementById('code-val').innerText = code;

            render();
            if(navigator.vibrate) navigator.vibrate(50);
        }

        function render() {
            document.getElementById('j-val').innerText = data.j;
            document.getElementById('z-val').innerText = data.z;
            document.getElementById('name-out').innerText = "代号：" + data.n;
            localStorage.setItem('DEER_LAST_DATA', JSON.stringify(data));
            
            var h = "";
            var provs = ["黄油乐奈", "黄油阿侬酱", "黄油", "客服大巴菲", "suki"];
            for(var i=0; i<provs.length; i++) {
                h += '<div style="display:flex;justify-content:space-between;padding:15px 0;border-bottom:1px solid #f0f0f0;">' +
                     '<span>'+ (i+1) + '. ' + provs[i] + '</span><b>' + (9900 - i*1500) + '</b></div>';
            }
            document.getElementById('rank-list').innerHTML = h;
        }

        function makeShot() {
            var area = document.getElementById('shot-area');
            html2canvas(area, { backgroundColor: '#F7F2FA' }).then(function(canvas) {
                var img = new Image();
                img.src = canvas.toDataURL();
                document.getElementById('img-box').innerHTML = '';
                document.getElementById('img-box').appendChild(img);
                document.getElementById('img-preview').style.display = 'flex';
            }).catch(function(e) {
                alert('截图失败，请确保网络连接正常以加载插件');
            });
        }
    </script>

</body>
</html>
