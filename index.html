<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🦌了吗</title>
    <!-- 引入截图插件，如果此链接失效，请检查网络 -->
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <style>
        :root { 
            --主色: #6750A4; --背景: #F7F2FA; --卡片: #E7E0EC; 
            --文字: #1C1B1F; --次要文字: #49454F;
            --健康: #4CAF50; --警告: #FB8C00; --危险: #B3261E;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { height: 100%; margin: 0; font-family: sans-serif; background: var(--背景); color: var(--文字); overflow: hidden; }
        
        /* 隐身模式样式 */
        body.panic-active { background: #FFFFFF !important; }
        body.panic-active #nav-bar, body.panic-active .btn-deer, body.panic-active #shot-area, body.panic-active .heatmap-container { display: none !important; }
        body.panic-active #panic-view { display: block !important; }

        header { height: 60px; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 600; color: var(--主色); background: var(--背景); cursor: pointer; user-select: none; }

        #content { height: calc(100% - 140px); overflow-y: auto; padding: 16px; position: relative; }
        .view { display: none; }
        .active { display: block !important; }

        .card { background: var(--卡片); border-radius: 24px; padding: 20px; margin-bottom: 16px; }
        .num { font-size: 42px; font-weight: 900; color: var(--主色); text-align: center; display: block; line-height: 1; }
        .label { font-size: 12px; color: var(--次要文字); text-align: center; text-transform: uppercase; margin-top: 4px; }
        
        /* 状态条 */
        .health-bar-bg { width: 100%; height: 8px; background: #ddd; border-radius: 4px; margin: 12px 0; overflow: hidden; }
        #health-fill { width: 100%; height: 100%; background: var(--健康); transition: 0.5s; }

        .heatmap-container { display: grid; grid-template-columns: repeat(10, 1fr); gap: 6px; margin-top: 10px; }
        .heat-cell { aspect-ratio: 1; background: #D9D9D9; border-radius: 4px; }

        .btn-deer { background: var(--主色); color: white; border: none; width: 100%; padding: 18px; border-radius: 100px; font-size: 18px; font-weight: 600; margin: 15px 0; }
        .btn-deer:disabled { background: #ccc; }

        nav { position: fixed; bottom: 0; width: 100%; height: 80px; background: #F3EDF7; display: flex; align-items: center; border-top: 1px solid #ddd; z-index: 100; }
        .tab { flex: 1; text-align: center; font-size: 12px; color: var(--次要文字); cursor: pointer; }
        .pill { width: 56px; height: 32px; border-radius: 16px; margin: 0 auto 4px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
        .tab-active { color: var(--主色); font-weight: bold; }
        .tab-active .pill { background: #EADDFF; }

        #panic-view { display: none; padding: 20px; color: #333; line-height: 1.6; }
        .word-card { background: #f0f0f0; padding: 15px; border-radius: 8px; margin-bottom: 10px; border-left: 5px solid #2196F3; }

        #img-preview { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 10000; }
        #img-box canvas, #img-box img { max-width: 90%; border-radius: 12px; }
    </style>
</head>
<body>
    <div id="mask" style="position:fixed;inset:0;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;z-index:9999;">
        <div style="background:white;padding:30px;border-radius:28px;width:80%;">
            <h2 style="margin:0;color:var(--主色)">欢迎</h2>
            <input type="text" id="name-in" placeholder="输入代号" style="width:100%;padding:15px;margin:20px 0;border:1px solid #ddd;border-radius:12px;">
            <button onclick="saveName()" class="btn-deer" style="margin:0">确认</button>
        </div>
    </div>

    <div id="img-preview" onclick="this.style.display='none'">
        <div id="img-box"></div>
        <p style="color:white;margin-top:15px;font-size:12px;">长按图片保存到相册，点击关闭</p>
    </div>

    <header ondblclick="togglePanic()">🦌 空间</header>

    <div id="content">
        <div id="panic-view">
            <h3>📖 英语每日单词</h3>
            <div class="word-card"><b>Ambition</b><br>n. 雄心，抱负，野心</div>
            <div class="word-card"><b>Persistence</b><br>n. 坚持不懈，持续</div>
            <div class="word-card"><b>Discipline</b><br>n. 纪律，训练，自制力</div>
        </div>

        <div id="main-ui">
            <div id="v0" class="view active">
                <div id="shot-area" style="background: var(--背景); padding: 10px;">
                    <div class="card" style="background:white; border:1px solid #eee; padding:15px;">
                        <div style="display:flex;justify-content:space-between;">
                            <span style="font-weight:bold;font-size:14px;">状态评估</span>
                            <span id="health-text" style="color:var(--健康);font-weight:bold;">精神焕发</span>
                        </div>
                        <div class="health-bar-bg"><div id="health-fill"></div></div>
                        <div id="health-desc" class="label" style="text-align:left;">状态极佳。</div>
                    </div>
                    <div id="name-out" style="text-align:center;font-weight:bold;color:var(--主色);margin-bottom:10px;">代号：...</div>
                    <div class="card">
                        <div style="display:flex;justify-content:space-around;text-align:center;">
                            <div><span class="num" id="j-val">0</span><span class="label">今日</span></div>
                            <div><span class="num" id="z-val">0</span><span class="label">累计</span></div>
                        </div>
                        <button class="btn-deer" id="main-btn" onclick="doDeer()">立即记录</button>
                    </div>
                    <div class="card" style="background:white;border:1px solid #eee;">
                        <span class="label" style="display:block;text-align:left;margin-bottom:8px;">近30日趋势</span>
                        <div id="heatmap" class="heatmap-container"></div>
                    </div>
                </div>
                <button onclick="makeShot()" style="width:100%;background:none;border:1px solid var(--主色);color:var(--主色);padding:14px;border-radius:100px;font-weight:bold;margin-top:10px;">生成战绩海报</button>
            </div>

            <div id="v1" class="view">
                <div class="card" style="background:white;border:1px solid #eee;">
                    <div style="text-align:center;font-weight:bold;margin-bottom:15px;color:var(--主色);">实时活跃排行</div>
                    <div id="rank-list"></div>
                </div>
            </div>

            <div id="v2" class="view">
                <div class="card" style="text-align:center;">
                    <div id="my-name" style="font-size:22px;font-weight:bold;color:var(--主色);">...</div>
                    <a href="https://pub-98e77454d5fc46438fe6f46cf574e4e5.r2.dev/QQ.html" style="display:block;padding:15px;background:#fff;border-radius:12px;margin:20px 0;text-decoration:none;color:#000;border:1px solid #eee;font-weight:bold;">💬 加入 QQ 社区</a>
                    <div class="label">Version 1.0.2 • Yresr & MZTN</div>
                </div>
            </div>
        </div>
    </div>

    <nav id="nav-bar">
        <div class="tab tab-active" onclick="go(0)"><div class="pill">🏠</div>首页</div>
        <div class="tab" onclick="go(1)"><div class="pill">🏆</div>排行</div>
        <div class="tab" onclick="window.open('https://r.aha666.com/share/raf?u=5295727174', '_blank')"><div class="pill">📖</div>在线JM</div>
        <div class="tab" onclick="go(2)"><div class="pill">👤</div>我的</div>
    </nav>

    <script>
        var data = JSON.parse(localStorage.getItem('DEER_V17_DATA')) || { j: 0, z: 0, n: "", t: "", logs: [] };
        if(data.t !== new Date().toDateString()) { data.j = 0; data.t = new Date().toDateString(); }
        if(data.n) { document.getElementById('mask').style.display = 'none'; render(); }

        function saveName() {
            var n = document.getElementById('name-in').value.trim();
            if(n) { data.n = n; document.getElementById('mask').style.display='none'; render(); }
        }

        function togglePanic() {
            document.body.classList.toggle('panic-active');
            const h = document.querySelector('header');
            h.innerText = document.body.classList.contains('panic-active') ? "单词背诵" : "🦌 空间";
        }

        function doDeer() {
            const btn = document.getElementById('main-btn');
            data.j++; data.z++; data.logs.push(Date.now());
            btn.disabled = true;
            let s = 2; btn.innerText = `冷静 (${s}s)`;
            let timer = setInterval(() => { s--; btn.innerText=`冷静 (${s}s)`; if(s<=0){clearInterval(timer);btn.disabled=false;btn.innerText="立即记录";} }, 1000);
            render();
            if(navigator.vibrate) navigator.vibrate(60);
        }

        function render() {
            document.getElementById('j-val').innerText = data.j;
            document.getElementById('z-val').innerText = data.z;
            document.getElementById('name-out').innerText = "代号：" + data.n;
            document.getElementById('my-name').innerText = data.n;
            
            const fill = document.getElementById('health-fill');
            const text = document.getElementById('health-text');
            let p = Math.max(0, 100 - (data.j * 15));
            fill.style.width = p + "%";
            if(data.j > 5) { text.innerText="警告：鸡巴痛"; text.style.color="var(--危险)"; fill.style.background="var(--危险)"; }
            else if(data.j > 0) { text.innerText="鸡巴略显疲惫"; text.style.color="var(--警告)"; fill.style.background="var(--警告)"; }

            const heatmap = document.getElementById('heatmap'); heatmap.innerHTML = '';
            for (let i = 29; i >= 0; i--) {
                const d = new Date(); d.setDate(new Date().getDate() - i);
                const count = data.logs.filter(l => new Date(l).toDateString() === d.toDateString()).length;
                const cell = document.createElement('div');
                cell.className = 'heat-cell';
                cell.style.background = count === 0 ? '#D9D9D9' : (count <= 2 ? '#E8DEF8' : '#6750A4');
                heatmap.appendChild(cell);
            }

            var r = ""; var names = ["黄油乐奈", "黄油阿侬酱", "客服大巴菲", "𝑙𝑙"];
            for(var i=0; i<names.length; i++) {
                r += `<div style="display:flex;justify-content:space-between;padding:12px 0;border-bottom:1px solid #eee;"><span>${i+1}. ${names[i]}</span><b>${9900 - i*1500}</b></div>`;
            }
            document.getElementById('rank-list').innerHTML = r;
            localStorage.setItem('DEER_V17_DATA', JSON.stringify(data));
        }

        function go(n) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('tab-active'));
            document.querySelectorAll('.view')[n].classList.add('active');
            document.querySelectorAll('.tab')[n === 2 ? 3 : n].classList.add('tab-active');
        }

        // --- 修复截图方案 ---
        function makeShot() {
            if (typeof html2canvas === 'undefined') {
                alert('截图插件尚未加载完成，请稍后再试或检查网络');
                return;
            }
            const area = document.getElementById('shot-area');
            html2canvas(area, { 
                useCORS: true, 
                backgroundColor: '#F7F2FA',
                scale: 2 
            }).then(canvas => {
                const skinType = Math.random() > 0.5 ? 'geek' : 'news';
                const finalCanvas = document.createElement('canvas');
                const ctx = finalCanvas.getContext('2d');
                finalCanvas.width = 600; finalCanvas.height = 800;

                if(skinType === 'geek') {
                    ctx.fillStyle = '#000'; ctx.fillRect(0,0,600,800);
                    ctx.fillStyle = '#fff'; ctx.font = 'bold 30px monospace';
                    ctx.fillText('STATUS: RECORDS_SYNC', 40, 80);
                    ctx.font = '20px monospace';
                    ctx.fillText('NAME: ' + data.n, 40, 140);
                    ctx.fillText('TOTAL: ' + data.z, 40, 180);
                    ctx.drawImage(canvas, 40, 250, 520, 450);
                } else {
                    ctx.fillStyle = '#f4ecd8'; ctx.fillRect(0,0,600,800);
                    ctx.fillStyle = '#000'; ctx.font = 'bold 45px serif';
                    ctx.fillText('🦌 报 (号外)', 180, 80);
                    ctx.font = 'bold 25px serif';
                    ctx.fillText(`震惊！代号${data.n}🦌管累计突破${data.z}次`, 60, 160);
                    ctx.drawImage(canvas, 50, 220, 500, 480);
                }
                
                document.getElementById('img-box').innerHTML = '';
                const img = new Image();
                img.src = finalCanvas.toDataURL("image/png");
                document.getElementById('img-box').appendChild(img);
                document.getElementById('img-preview').style.display = 'flex';
            }).catch(err => {
                alert('生成失败，可能是浏览器兼容性问题。建议使用自带浏览器打开。');
            });
        }
    </script>
</body>
</html>
